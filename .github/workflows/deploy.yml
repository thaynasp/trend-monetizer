name: Build and Deploy Site

on:
  push:
    branches:
      - master
    paths:
      - 'site/content/**'
      - 'site/scripts/**'
      - 'site/assets/**'
      - 'site/config.json'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown

      - name: Generate Site
        run: |
          cd site/scripts
          python generate.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add site/docs/
          git commit -m "Auto-generate site: ${{ github.sha }}" || echo "No changes to commit"
          git push
